services:
  # Backend Web Service
  - type: web
    name: hospital-backend
    env: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false # User will need to provide this in the dashboard
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  # Frontend Static Site
  - type: static_site
    name: hospital-frontend
    env: static
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: hospital-backend
          type: web
          property: host
        # Note: Render will inject the actual host URL here.
        # You might need to add /api/patients manually in code or config.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
